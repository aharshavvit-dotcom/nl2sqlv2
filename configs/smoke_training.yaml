pipeline:
  name: smoke_integrated_training
  seed: 42
  fail_fast: true
  promote_if_passed: false

datasets:
  names:
    - wikisql
  max_examples: 100

paths:
  processed_dir: data/processed
  artifacts_dir: artifacts
  model_bundle_dir: artifacts/model_bundle
  current_bundle_dir: artifacts/model_bundle/current
  candidate_bundle_dir: artifacts/model_bundle/candidate

retrieval:
  enabled: true
  output_dir: artifacts/work/retrieval_ir

neural:
  enabled: true
  config: configs/neural_training_smoke.yaml
  output_dir: artifacts/work/neural_ir
  epochs: 1
  batch_size: 4

self_training:
  enabled: false

ranker:
  enabled: false

evaluation:
  enabled: true
  output_dir: artifacts/work/evaluation
  run_unseen_db: false
  run_execution_aware: false

quality_gate:
  thresholds: evaluation/model_quality_thresholds.yaml
  required: false

bundle:
  build: true
  validate: true
  promote_if_quality_gate_passes: false
