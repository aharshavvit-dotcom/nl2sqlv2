pipeline:
  name: smoke_integrated_training
  seed: 42
  fail_fast: true
  promote_if_passed: false

datasets:
  names:
    - wikisql
  max_examples: 100
  max_examples_per_dataset:
    wikisql: 100
  min_converted_examples_required:
    wikisql: 1

paths:
  processed_dir: data/processed
  artifacts_dir: artifacts
  model_bundle_dir: artifacts/model_bundle
  current_bundle_dir: artifacts/model_bundle/current
  candidate_bundle_dir: artifacts/model_bundle/candidate

retrieval:
  enabled: true
  output_dir: artifacts/work/retrieval_ir

neural:
  enabled: true
  config: configs/neural_training_smoke.yaml
  output_dir: artifacts/work/neural_ir
  epochs: 1
  batch_size: 4

self_training:
  enabled: false

ranker:
  enabled: false

augmentation:
  schema_renaming:
    enabled: false

evaluation:
  enabled: true
  output_dir: artifacts/evaluation
  run_unseen_db: false
  run_execution_aware: false

calibration:
  enabled: true
  abstention_coverage_target: 0.95
  abstain_when_calibrated_confidence_below: null
  use_conformal_threshold: true

quality_gate:
  thresholds: evaluation/model_quality_thresholds.yaml
  required: false

bundle:
  build: true
  validate: true
  promote_if_quality_gate_passes: false
