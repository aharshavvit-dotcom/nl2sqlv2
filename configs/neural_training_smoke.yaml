# Neural QueryIR Training — Smoke Test Configuration
# Minimal settings for quick validation runs

model:
  model_version: schema_aware_queryir_v1
  architecture: schema_aware_queryir
  encoder: bigru
  hidden_dim: 192
  embedding_dim: 128
  candidate_hidden_dim: 128
  feed_forward_dim: 256
  activation: gelu
  dropout: 0.25
  layer_norm: true
  feed_forward_heads: true
  max_question_len: 64
  max_schema_len: 320
  max_candidate_tokens: 16
  max_tables: 64
  max_columns: 256
  relation_aware_attention:
    enabled: false
    relation_bias_mode: schema_pairwise_relation_bias
    pairwise_relation_matrix: true
    relation_types:
      - same_table
      - table_has_column
      - column_belongs_to_table
      - fk_to_pk
      - pk_to_fk
      - primary_key
      - foreign_key_column
      - same_column_name
      - same_data_type
      - unrelated
    bias_init: 0.0

optimizer:
  name: adamw
  learning_rate: 0.0007
  weight_decay: 0.00001

scheduler:
  name: none

training:
  curriculum:
    enabled: true
    mode: ordered_dataset
    allow_ordered_dataset_fallback: false
    phases: [level_1_single_table, level_2_filter_count, level_3_aggregation, level_4_join]
  batch_size: 4
  epochs: 1
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  early_stopping_patience: 99
  seed: 42
  device: auto
  precision: float32
  determinism_mode: seeded
  save_best_metric: loss
  save_best_mode: min
  semantic_score_min_support: 1
  semantic_score_weights:
    intent_accuracy: 0.20
    metric_column_pointer_accuracy: 0.15
    filter_column_accuracy: 0.20
    filter_value_accuracy: 0.20
    dimension_column_accuracy: 0.10
    component_accuracy_floor: 0.15

loss:
  intent: 1.0
  base_table: 1.0
  metric_column: 1.0
  dimension_column: 1.0
  filter_column: 1.0
  date_column: 1.0
  complexity: 0.3
  hard_negative: 0.1
  capability: 0.4
  safety: 0.6

data:
  train_path: data/processed/generic_ir_train.jsonl
  validation_path: data/processed/generic_ir_validation.jsonl
  hard_negatives_path: data/processed/generic_ir_hard_negatives.jsonl
  max_examples: 100

output:
  output_dir: artifacts/neural_ir_model
  save_diagnostics: true
  save_effective_config: true
