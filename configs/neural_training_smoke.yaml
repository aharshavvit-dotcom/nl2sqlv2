# Neural QueryIR Training — Smoke Test Configuration
# Minimal settings for quick validation runs

model:
  model_version: schema_aware_queryir_v1
  architecture: schema_aware_queryir
  encoder: bigru
  hidden_dim: 192
  embedding_dim: 128
  candidate_hidden_dim: 128
  feed_forward_dim: 256
  activation: gelu
  dropout: 0.25
  layer_norm: true
  feed_forward_heads: true
  max_question_len: 64
  max_schema_len: 320
  max_candidate_tokens: 16
  max_tables: 64
  max_columns: 256

optimizer:
  name: adamw
  learning_rate: 0.0007
  weight_decay: 0.00001

scheduler:
  name: none

training:
  batch_size: 4
  epochs: 1
  gradient_clipping: 1.0
  early_stopping_patience: 99
  seed: 42
  save_best_metric: overall_slot_accuracy
  save_best_mode: max

loss:
  intent: 1.0
  base_table: 1.0
  metric_column: 1.0
  dimension_column: 1.0
  filter_column: 1.0
  date_column: 1.0
  hard_negative: 0.3

data:
  train_path: data/processed/generic_ir_train.jsonl
  validation_path: data/processed/generic_ir_validation.jsonl
  hard_negatives_path: data/processed/generic_ir_hard_negatives.jsonl
  max_examples: 100

output:
  output_dir: artifacts/neural_ir_model
  save_diagnostics: true
  save_effective_config: true
