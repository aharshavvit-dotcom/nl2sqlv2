# Neural QueryIR Training — Default Configuration
# AdamW + GELU + LayerNorm + Dropout + gradient clipping + ReduceLROnPlateau
# Tuned for anti-overfitting with label smoothing and higher regularization.

model:
  model_version: schema_aware_queryir_v1
  architecture: schema_aware_queryir
  encoder: bigru
  hidden_dim: 192
  embedding_dim: 128
  candidate_hidden_dim: 128
  feed_forward_dim: 256
  activation: gelu
  dropout: 0.40          # Increased from 0.25 — anti-overfitting on 3.8k dataset
  pointer_dropout: 0.45  # Increased from 0.30 — pointer heads need stronger regularization
  layer_norm: true
  feed_forward_heads: true
  max_question_len: 64
  max_schema_len: 320
  max_candidate_tokens: 16
  max_tables: 64
  max_columns: 256
  relation_aware_attention:
    enabled: false
    relation_bias_mode: schema_pairwise_relation_bias
    pairwise_relation_matrix: true
    relation_types:
      - same_table
      - table_has_column
      - column_belongs_to_table
      - fk_to_pk
      - pk_to_fk
      - primary_key
      - foreign_key_column
      - same_column_name
      - same_data_type
      - unrelated
    bias_init: 0.0

optimizer:
  name: adamw
  learning_rate: 0.0003   # Reduced from 0.0007 — prevents oscillation in val loss
  weight_decay: 0.001     # Increased from 0.0001 — stronger L2 regularization
  pointer_head_weight_decay: 0.005  # Increased from 0.001 — pointer heads overfit fastest
  momentum: 0.9
  nesterov: false

scheduler:
  name: reduce_on_plateau
  factor: 0.5
  patience: 1             # Reduced from 2 — faster LR reduction on plateau
  min_lr: 0.000001

training:
  batch_size: 16          # Increased from 8 — smoother gradients, less overfitting
  epochs: 15              # Increased from 10 — more time to converge with lower LR
  gradient_clipping: 1.0
  early_stopping_patience: 3  # Increased from 2 — more patience with slower LR
  seed: 42
  device: auto
  precision: float32
  determinism_mode: seeded
  save_best_metric: support_weighted_semantic_score
  save_best_mode: max
  semantic_score_min_support: 1
  semantic_score_weights:
    intent_macro_f1: 0.15
    projection_exact_match: 0.15
    filter_column_accuracy: 0.25    # Increased from 0.20 — critical weak head
    filter_value_accuracy: 0.20
    dimension_column_accuracy: 0.15 # Increased from 0.10 — critical weak head
    semantic_pass_rate: 0.10
  curriculum:
    enabled: true
    mode: ordered_dataset
    allow_ordered_dataset_fallback: false
    phases:
      - level_1_single_table
      - level_2_filter_count
      - level_3_aggregation
      - level_4_join
      - level_5_advanced_sql

loss:
  label_smoothing: 0.1   # NEW — prevents overconfident predictions, reduces overfitting
  intent: 1.5            # Increased from 1.0 — critical weak head (12.7% val accuracy)
  base_table: 1.0        # Decreased from 1.2 — already strong (76.3% val accuracy)
  metric_column: 1.0
  metric_aggregation: 1.2  # Increased from 0.8 — very weak (14.1% val accuracy)
  metric_expression_type: 0.8
  dimension_column: 1.5  # Increased from 1.0 — critical weak head (27.4% test)
  filter_column: 2.0     # Increased from 1.2 — critical weak head (28.7% test)
  date_column: 1.0
  date_grain: 0.4        # Decreased from 0.6 — already perfect (100% val accuracy)
  date_filter_type: 0.4  # Decreased from 0.6 — already strong (97.8% val accuracy)
  filter_operator: 0.8
  order_direction: 0.4   # Decreased from 0.6 — already strong (92.5% val accuracy)
  limit_bucket: 0.3      # Decreased from 0.4 — already strong (95.3% val accuracy)
  hard_negative: 0.0     # Temporarily disabled: expanded dataset schemas don't match HN candidates

data:
  train_path: data/processed/generic_ir_train.jsonl
  validation_path: data/processed/generic_ir_validation.jsonl
  hard_negatives_path: data/processed/generic_ir_hard_negatives.jsonl
  max_examples: 0

output:
  output_dir: artifacts/neural_ir_model
  save_diagnostics: true
  save_effective_config: true
