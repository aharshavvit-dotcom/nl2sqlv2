pipeline:
  name: full_integrated_training
  seed: 42
  fail_fast: true
  promote_if_passed: true

datasets:
  names:
    - wikisql
    - spider
    - bird-mini
  max_examples: 5000
  max_examples_per_dataset:
    wikisql: 5000
    spider: 5000
    bird-mini: 5000
  min_converted_examples_required:
    wikisql: 100
    spider: 100
    bird-mini: 100

paths:
  processed_dir: data/processed
  artifacts_dir: artifacts
  model_bundle_dir: artifacts/model_bundle
  current_bundle_dir: artifacts/model_bundle/current
  candidate_bundle_dir: artifacts/model_bundle/candidate

retrieval:
  enabled: true
  output_dir: artifacts/work/retrieval_ir

neural:
  enabled: true
  config: configs/neural_training_default.yaml
  output_dir: artifacts/work/neural_ir
  epochs: 15
  batch_size: 8

self_training:
  enabled: true
  iterations: 1
  max_examples: 1000

ranker:
  enabled: true
  output_dir: artifacts/work/adaptive_ranker

augmentation:
  schema_renaming:
    enabled: true
    multiplier: 1
    modes:
      - neutral_names
      - domain_shift_names

evaluation:
  enabled: true
  output_dir: artifacts/evaluation
  run_unseen_db: true
  run_execution_aware: true

calibration:
  enabled: true
  abstention_coverage_target: 0.95
  abstain_when_calibrated_confidence_below: null
  use_conformal_threshold: true

quality_gate:
  thresholds: evaluation/model_quality_thresholds.yaml
  required: true
  mode: production

bundle:
  build: true
  validate: true
  promote_if_quality_gate_passes: true

execution_aware:
  controlled_fixtures:
    enabled: true
    required_for_full_training: true
    output: artifacts/evaluation/controlled_fixture_evaluation_report.json
  controlled_predicted_sql:
    enabled: false
    required_for_full_training: false
    require_report_attached_to_bundle: true
    min_execution_match_rate: 0.70

# Multi-seed training variance (disabled by default).
# When enabled, repeats evaluation over multiple seeds and reports metric variance.
# This does NOT affect the primary training run — it adds a post-training
# variance analysis step for monitoring metric stability.
seeds:
  enabled: false
  values: [42, 123, 456]
  report_output: artifacts/evaluation/multi_seed_variance_report.json
  metrics:
    - intent_macro_f1
    - base_table_accuracy
    - join_decision_macro_f1
    - sql_validation_rate
    - query_ir_validity_rate
    - execution_match_rate
