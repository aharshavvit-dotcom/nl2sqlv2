pipeline:
  name: baseline_integrated_training
  seed: 42
  fail_fast: true
  promote_if_passed: false

datasets:
  names: [wikisql, bird-mini]
  max_examples: 1000
  max_examples_per_dataset: {wikisql: 500, bird-mini: 500}
  min_converted_examples_required: {wikisql: 10, bird-mini: 30}

paths:
  processed_dir: data/processed
  artifacts_dir: artifacts
  model_bundle_dir: artifacts/model_bundle
  current_bundle_dir: artifacts/model_bundle/current
  candidate_bundle_dir: artifacts/model_bundle/candidates

retrieval:
  enabled: true
  output_dir: artifacts/work/retrieval_ir

neural:
  enabled: true
  config: configs/neural_training_default.yaml
  output_dir: artifacts/work/neural_ir

self_training: {enabled: false}
ranker: {enabled: false}
augmentation: {schema_renaming: {enabled: false}}

evaluation:
  enabled: true
  output_dir: artifacts/evaluation
  run_unseen_db: true
  run_execution_aware: true

calibration:
  enabled: true
  abstention_coverage_target: 0.95
  abstain_when_calibrated_confidence_below: null
  use_conformal_threshold: true

quality_gate:
  thresholds: evaluation/model_quality_thresholds.yaml
  required: false
  mode: baseline

feedback_regression:
  enabled: false
  required_for_production: false
  report_path: artifacts/evaluation/feedback_regression_report.json

bundle:
  build: true
  validate: true
  promote_if_quality_gate_passes: false

execution_aware:
  controlled_fixtures:
    enabled: true
    required_for_full_training: false
  controlled_predicted_sql:
    enabled: true
    required_for_full_training: false
    require_report_attached_to_bundle: false
    min_execution_match_rate: 0.0

app:
  allow_candidate_bundle_debug: true

seeds: {enabled: false}
