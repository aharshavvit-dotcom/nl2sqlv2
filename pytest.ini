[pytest]
norecursedirs =
    tests/legacy
    .git
    .pytest_cache
    venv
    .venv
markers =
    unit: fast isolated tests for deterministic module-level behaviour
    integration: tests that exercise multiple local components together
    regression: known production or historical bug regressions
    e2e: end-to-end or smoke tests for runnable workflows
    safety: SQL safety, privacy, read-only execution, and guardrail tests
    contract: public interface, artifact, bundle, and compatibility contracts
    property: property-based tests over generated input spaces
    slow: tests intentionally excluded from the fast developer lane
    gpu: tests requiring GPU acceleration
    database: tests requiring a local database fixture or connector
    performance: latency, throughput, or resource-bound tests
    training: model-training, promotion, or training-pipeline tests
    legacy: archived compatibility tests excluded from default collection
