name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  audit-guardrails:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run audit guardrail tests
        run: >
          python -m pytest
          tests/test_training_audit_fixes.py
          tests/test_capability_training_batch.py
          tests/test_70_training_config.py
          tests/test_78_neural_training_smoke.py
          tests/test_79_smoke_and_ablation_validation.py
          tests/test_134_database_integration.py
          tests/test_run_scoped_state_domain.py
          tests/test_dataset_split_integrity.py
